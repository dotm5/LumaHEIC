<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">LumaHEIC</title>
  <desc id="desc">A compact image frame with a luminance gain-map curve and HDR highlight.</desc>
  <defs>
    <linearGradient id="lh-bg" x1="10" x2="54" y1="8" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1b22"/>
      <stop offset=".58" stop-color="#12362f"/>
      <stop offset="1" stop-color="#0a1117"/>
    </linearGradient>
    <linearGradient id="lh-map" x1="18" x2="48" y1="48" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2db8a6"/>
      <stop offset=".52" stop-color="#c7ef7c"/>
      <stop offset="1" stop-color="#ffd36a"/>
    </linearGradient>
    <radialGradient id="lh-glow" cx="0" cy="0" r="1" gradientTransform="matrix(18 0 0 18 43 21)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff6c7"/>
      <stop offset=".35" stop-color="#ffd36a"/>
      <stop offset="1" stop-color="#ffd36a" stop-opacity="0"/>
    </radialGradient>
    <filter id="lh-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#020609" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#lh-bg)"/>
  <circle cx="43" cy="21" r="18" fill="url(#lh-glow)"/>
  <g filter="url(#lh-shadow)">
    <rect x="13" y="15" width="38" height="34" rx="8" fill="#f8fbf7"/>
    <rect x="17" y="19" width="30" height="26" rx="5" fill="#101920"/>
    <path fill="#28433e" d="M17 37.5 25.3 29l7.1 6.4 4.8-4.8L47 40.2V45H17z"/>
    <circle cx="39.5" cy="25.5" r="4.6" fill="#ffd36a"/>
    <path fill="none" stroke="url(#lh-map)" stroke-linecap="round" stroke-linejoin="round" stroke-width="4.4" d="M19.5 40.5c7.2-.7 10.2-3.8 13.3-9.8 2.7-5.1 6.2-8 12.5-8.6"/>
    <path fill="none" stroke="#f8fbf7" stroke-linecap="round" stroke-width="1.5" stroke-opacity=".72" d="M21 23.5h10"/>
    <path fill="none" stroke="#f8fbf7" stroke-linecap="round" stroke-width="1.5" stroke-opacity=".38" d="M21 27.5h6"/>
  </g>
</svg>
